name: Build SCIP + JSCIPOpt

on:
  workflow_dispatch:
    inputs:
      scipoptsuite_version:
        type: string
        description: "SCIPOptSuite version (e.g. 9.2.3)"
        required: true
        default: "9.2.3"
      macos:
        type: boolean
        description: Build for macOS
        default: true
      linux:
        type: boolean
        description: Build for Linux (Amazon Linux 2023)
        default: true
      static:
        type: boolean
        description: Build static libraries (instead of shared)
        default: false
      use_cached_dependencies:
        type: boolean
        description: Use cached dependencies
        default: true
  push:
    tags:
      - 'v*'

jobs:
  macos-build:
    runs-on: macos-14
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.macos == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Restore dependencies cache
        if: github.event.inputs.use_cached_dependencies != 'false'
        id: cache-deps-macos
        uses: actions/cache@v4
        with:
          path: deps_static
          key: macos-arm64-deps-v2-${{ hashFiles('.github/workflows/scripts/macos.sh') }}

      - name: Build SCIP + JSCIPOpt (macOS)
        run: bash -x .github/workflows/scripts/macos.sh
        env:
          SCIPOPTSUITE_VERSION: ${{ github.event.inputs.scipoptsuite_version || '9.2.3' }}
          STATIC: ${{ github.event.inputs.static || 'false' }}
          DEPS_CACHED: ${{ steps.cache-deps-macos.outputs.cache-hit }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ github.workspace }}/out.zip

  linux-build:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.linux == 'true')
    container:
      image: amazonlinux:2023
    steps:
      - name: Install base tools
        run: |
          dnf install -y tar gzip git wget curl
      - uses: actions/checkout@v4

      - name: Restore dependencies cache
        if: github.event.inputs.use_cached_dependencies != 'false'
        id: cache-deps-linux
        uses: actions/cache@v4
        with:
          path: deps_static
          key: linux-x86_64-deps-v2-${{ hashFiles('.github/workflows/scripts/linux.sh') }}

      - name: Build SCIP + JSCIPOpt (Linux AL2023)
        run: bash -x .github/workflows/scripts/linux.sh
        env:
          SCIPOPTSUITE_VERSION: ${{ github.event.inputs.scipoptsuite_version || '9.2.3' }}
          STATIC: ${{ github.event.inputs.static || 'false' }}
          DEPS_CACHED: ${{ steps.cache-deps-linux.outputs.cache-hit }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            ${{ github.workspace }}/out.zip
            ${{ github.workspace }}/test_package.zip

  merge-artifacts:
    needs: [macos-build, linux-build]
    if: >-
      always() &&
      (needs.macos-build.result == 'success' || needs.linux-build.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: all-platforms
          pattern: "{macos-arm64,linux-x86_64}"

  release:
    needs: [merge-artifacts]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: all-platforms
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

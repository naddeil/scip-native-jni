name: Build SCIP + JSCIPOpt

on:
  workflow_dispatch:
    inputs:
      scipoptsuite_version:
        type: string
        description: "SCIPOptSuite version (e.g. 9.2.3)"
        required: true
        default: "9.2.3"
      macos:
        type: boolean
        description: Build for macOS
        default: true
      linux:
        type: boolean
        description: Build for Linux (Amazon Linux 2023)
        default: true
      static:
        type: boolean
        description: Build static libraries (instead of shared)
        default: false
  push:
    tags:
      - 'v*'

jobs:
  macos-build:
    runs-on: macos-14
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.macos == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Build SCIP + JSCIPOpt (macOS)
        run: bash -x .github/workflows/scripts/macos.sh
        env:
          SCIPOPTSUITE_VERSION: ${{ github.event.inputs.scipoptsuite_version || '9.2.3' }}
          STATIC: ${{ github.event.inputs.static || 'false' }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ github.workspace }}/out.zip

  macos-test:
    needs: macos-build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: .

      - name: Extract artifact
        run: unzip -o out.zip

      - name: Test (macOS)
        run: bash -x .github/workflows/scripts/macos-test.sh
        env:
          SCIPOPTSUITE_VERSION: ${{ github.event.inputs.scipoptsuite_version || '9.2.3' }}

  linux-build:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.linux == 'true')
    container:
      image: amazonlinux:2023
    steps:
      - name: Install base tools
        run: |
          dnf install -y --allowerasing tar gzip git wget curl which
      - uses: actions/checkout@v4

      - name: Build SCIP + JSCIPOpt (Linux AL2023)
        run: bash -x .github/workflows/scripts/linux.sh
        env:
          SCIPOPTSUITE_VERSION: ${{ github.event.inputs.scipoptsuite_version || '9.2.3' }}
          STATIC: ${{ github.event.inputs.static || 'false' }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            ${{ github.workspace }}/out.zip
            ${{ github.workspace }}/test_package.zip

  linux-test:
    needs: linux-build
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023
    steps:
      - name: Install base tools
        run: dnf install -y --allowerasing tar gzip git unzip
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-x86_64
          path: .

      - name: Extract artifact
        run: unzip -o out.zip

      - name: Test (Linux AL2023)
        run: bash -x .github/workflows/scripts/linux-test.sh
        env:
          SCIPOPTSUITE_VERSION: ${{ github.event.inputs.scipoptsuite_version || '9.2.3' }}

  merge-artifacts:
    needs: [macos-test, linux-test]
    if: >-
      always() &&
      (needs.macos-test.result == 'success' || needs.linux-test.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: all-platforms
          pattern: "{macos-arm64,linux-x86_64}"

  release:
    needs: [merge-artifacts]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: all-platforms
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

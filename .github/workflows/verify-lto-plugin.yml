name: Verify GCC LTO Plugin

on:
  workflow_dispatch:

jobs:
  check-lto:
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023

    steps:
      - name: Install toolchain
        run: |
          dnf install -y gcc gcc-c++ binutils

      - name: GCC and linker versions
        run: |
          gcc --version | head -1
          ld --version  | head -1
          ld.gold --version 2>/dev/null | head -1 || echo "gold non disponibile"

      - name: Check linker plugin support (ld)
        run: |
          echo "=== ld --help | grep plugin ==="
          if ld --help 2>&1 | grep -q '\-plugin'; then
            echo "OK: ld supporta --plugin"
            ld --help 2>&1 | grep plugin
          else
            echo "WARN: ld NON mostra supporto plugin"
          fi

      - name: Check linker plugin support (gold)
        run: |
          if command -v ld.gold &>/dev/null; then
            echo "=== ld.gold disponibile ==="
            ld.gold --help 2>&1 | grep plugin || echo "gold presente ma senza supporto plugin"
          else
            echo "SKIP: gold non disponibile su AL2023 — usa GNU ld (ok)"
          fi
      - name: Locate LTO plugin .so
        run: |
          echo "=== Ricerca liblto_plugin.so ==="
          PLUGIN=$(find /usr -name 'liblto_plugin.so' 2>/dev/null | head -1)
          if [ -n "$PLUGIN" ]; then
            echo "OK: trovato $PLUGIN"
            ls -lh "$PLUGIN"
          else
            echo "ERRORE: liblto_plugin.so non trovato!"
            exit 1
          fi

      - name: Check bfd-plugins directory
        run: |
          echo "=== /usr/lib/bfd-plugins ==="
          if [ -d /usr/lib/bfd-plugins ]; then
            ls -la /usr/lib/bfd-plugins/
          else
            echo "WARN: /usr/lib/bfd-plugins non esiste"
            echo "  ar/nm/ranlib potrebbero non trovare il plugin automaticamente"
          fi

      - name: Verify collect2 uses plugin during -flto link
        run: |
          echo 'int main(){return 0;}' > /tmp/test.c
          echo "=== gcc -O2 -flto -v ==="
          gcc -O2 -flto /tmp/test.c -o /tmp/test_lto -v 2>&1 | tee /tmp/lto_log.txt

          echo ""
          echo "=== Linea collect2 ==="
          if grep -q 'plugin.*liblto_plugin' /tmp/lto_log.txt; then
            echo "OK: collect2 passa il plugin LTO al linker"
            grep 'plugin' /tmp/lto_log.txt
          else
            echo "ERRORE: plugin LTO NON passato al linker!"
            echo "  LTO compila bytecode ma non ottimizza al link — caso peggiore"
            exit 1
          fi

      - name: Verify ar/nm work with LTO objects
        run: |
          echo 'int foo(int x){return x*2;}' > /tmp/a.c
          echo 'int bar(int x){return x+1;}' > /tmp/b.c
          gcc -O2 -flto -c /tmp/a.c -o /tmp/a.o
          gcc -O2 -flto -c /tmp/b.c -o /tmp/b.o

          echo "=== nm su LTO object ==="
          if nm /tmp/a.o 2>/dev/null | grep -q foo; then
            echo "OK: nm legge simboli da LTO object (plugin attivo o fat objects)"
          else
            echo "WARN: nm non legge LTO objects — potrebbe servire gcc-nm o plugin"
            gcc-nm /tmp/a.o 2>/dev/null || echo "gcc-nm non disponibile"
          fi

          echo ""
          echo "=== ar con LTO objects ==="
          ar rcs /tmp/libtest_lto.a /tmp/a.o /tmp/b.o
          if ar t /tmp/libtest_lto.a | grep -q 'a.o'; then
            echo "OK: ar gestisce LTO objects"
          else
            echo "WARN: ar potrebbe non funzionare con slim LTO objects"
          fi

      - name: End-to-end LTO shared library test
        run: |
          cat > /tmp/lib1.c << 'EOF'
          int internal_helper(int x) { return x * 3 + 1; }
          int public_api(int x)     { return internal_helper(x) + 10; }
          EOF

          cat > /tmp/lib2.c << 'EOF'
          extern int public_api(int);
          int combined(int x) { return public_api(x) * 2; }
          EOF

          cat > /tmp/main.c << 'EOF'
          #include <stdio.h>
          extern int combined(int);
          int main() { printf("%d\n", combined(5)); return 0; }
          EOF

          echo "=== Build shared lib con -flto ==="
          gcc -O3 -flto -fPIC -c /tmp/lib1.c -o /tmp/lib1.o
          gcc -O3 -flto -fPIC -c /tmp/lib2.c -o /tmp/lib2.o
          gcc -O3 -flto -shared /tmp/lib1.o /tmp/lib2.o -o /tmp/libcombo.so
          gcc -O3 /tmp/main.c -L/tmp -lcombo -Wl,-rpath,/tmp -o /tmp/test_e2e

          RESULT=$(/tmp/test_e2e)
          if [ "$RESULT" = "52" ]; then
            echo "OK: risultato corretto ($RESULT) — LTO shared lib funziona"
          else
            echo "ERRORE: risultato $RESULT, atteso 52"
            exit 1
          fi

          echo ""
          echo "=== Verifica inlining (internal_helper non dovrebbe essere esportato) ==="
          if nm -D /tmp/libcombo.so | grep -q internal_helper; then
            echo "INFO: internal_helper ancora esportato (visibilità default)"
            echo "  Considera -fvisibility=hidden per massimizzare LTO"
          else
            echo "OK: internal_helper rimosso/inlinato da LTO"
          fi

      - name: Summary
        run: |
          echo "============================================"
          echo "  RIEPILOGO CONFIGURAZIONE LTO"
          echo "============================================"
          echo "GCC:    $(gcc --version | head -1)"
          echo "ld:     $(ld --version | head -1)"
          PLUGIN=$(find /usr -name 'liblto_plugin.so' 2>/dev/null | head -1)
          echo "Plugin: ${PLUGIN:-NON TROVATO}"
          echo ""
          echo "Se tutti i check sono passati, il tuo -DLTO=on"
          echo "su SCIP sta effettivamente ottimizzando al link-time."
          echo "============================================"

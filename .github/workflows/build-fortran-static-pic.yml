# ===========================================================================
#  .github/workflows/build-fortran-static-pic.yml
#
#  Build libgfortran.a + libquadmath.a statiche con -fPIC.
#  Trigger: manuale (workflow_dispatch) con parametri configurabili.
#
#  Usa il top-level configure di GCC + build selettivo dei soli target
#  libquadmath/libgfortran per evitare l'errore:
#    "Link tests are not allowed after GCC_NO_EXECUTABLES"
# ===========================================================================
name: Build Fortran Static PIC Libs

on:
  workflow_dispatch:
    inputs:
      gcc_version:
        description: "Versione GCC"
        required: true
        default: "13.2.0"
        type: string
      platforms:
        description: "Piattaforme target"
        required: true
        default: "linux-x64"
        type: choice
        options:
          - linux-x64
          - linux-aarch64
          - both
      retention_days:
        description: "Giorni di retention degli artifact"
        required: false
        default: "30"
        type: string

env:
  GCC_VERSION: ${{ github.event.inputs.gcc_version }}
  PREFIX: /opt/fortran-pic

jobs:
  # ───────────────────────────────────────────────────────────────────────
  #  Build x86_64
  # ───────────────────────────────────────────────────────────────────────
  build-x64:
    if: ${{ inputs.platforms == 'linux-x64' || inputs.platforms == 'both' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential gfortran wget xz-utils \
            libgmp-dev libmpfr-dev libmpc-dev flex

      - name: Cache GCC sources
        uses: actions/cache@v4
        with:
          path: /tmp/gcc-build/gcc-${{ env.GCC_VERSION }}.tar.xz
          key: gcc-src-${{ env.GCC_VERSION }}

      - name: Download & extract GCC
        run: |
          mkdir -p /tmp/gcc-build && cd /tmp/gcc-build
          if [ ! -f "gcc-${GCC_VERSION}.tar.xz" ]; then
            wget -q "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz"
          fi
          tar xf "gcc-${GCC_VERSION}.tar.xz"
          cd "gcc-${GCC_VERSION}"
          ./contrib/download_prerequisites

      - name: Configure (top-level, --with-pic)
        run: |
          mkdir -p /tmp/gcc-build/build-pic
          cd /tmp/gcc-build/build-pic

          /tmp/gcc-build/gcc-${GCC_VERSION}/configure \
            --prefix="${PREFIX}" \
            --enable-languages=c,fortran \
            --disable-bootstrap \
            --disable-multilib \
            --disable-shared \
            --enable-static \
            --with-pic \
            --disable-libsanitizer \
            --disable-libgomp \
            --disable-libvtv \
            --disable-libatomic \
            --disable-libstdcxx \
            --disable-libssp \
            --disable-libcc1 \
            --disable-libitm \
            --without-isl

      - name: Build GCC (compiler stage)
        run: |
          cd /tmp/gcc-build/build-pic
          make -j$(nproc) all-gcc

      - name: Build libquadmath
        run: |
          cd /tmp/gcc-build/build-pic
          make -j$(nproc) all-target-libquadmath

      - name: Build libgfortran
        run: |
          cd /tmp/gcc-build/build-pic
          make -j$(nproc) all-target-libgfortran

      - name: Install
        run: |
          cd /tmp/gcc-build/build-pic
          sudo make install-target-libquadmath
          sudo make install-target-libgfortran
          # Rimuovi eventuali .so residue
          sudo find ${PREFIX} -name '*.so*' -delete 2>/dev/null || true

      - name: Verify PIC
        run: |
          echo "── libquadmath.a ──"
          LQM=$(find ${PREFIX} -name 'libquadmath.a' -print -quit)
          echo "path: ${LQM}"
          ls -lh "${LQM}"
          ABS=$(objdump -r "${LQM}" 2>/dev/null | grep -cE 'R_X86_64_32$' || true)
          ABS=${ABS:-0}
          echo "R_X86_64_32 relocations: ${ABS}"
          [ "${ABS}" -eq 0 ] && echo "✓ PIC OK" || echo "⚠ possibile non-PIC (${ABS} absolute relocs)"

          echo ""
          echo "── libgfortran.a ──"
          LGF=$(find ${PREFIX} -name 'libgfortran.a' -print -quit)
          echo "path: ${LGF}"
          ls -lh "${LGF}"
          ABS=$(objdump -r "${LGF}" 2>/dev/null | grep -cE 'R_X86_64_32$' || true)
          ABS=${ABS:-0}
          echo "R_X86_64_32 relocations: ${ABS}"
          [ "${ABS}" -eq 0 ] && echo "✓ PIC OK" || echo "⚠ possibile non-PIC (${ABS} absolute relocs)"

      - name: Package artifacts
        run: |
          cd ${PREFIX}
          tar czf /tmp/fortran-static-pic-linux-x64-gcc${GCC_VERSION}.tar.gz \
            $(find . -name '*.a' -o -name '*.spec' -o -name '*.la' -o -name '*.mod' | sort)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortran-static-pic-linux-x64-gcc${{ env.GCC_VERSION }}
          path: /tmp/fortran-static-pic-linux-x64-gcc${{ env.GCC_VERSION }}.tar.gz
          retention-days: ${{ inputs.retention_days }}

  # ───────────────────────────────────────────────────────────────────────
  #  Build aarch64 (emulato via QEMU su runner x64)
  # ───────────────────────────────────────────────────────────────────────
  build-aarch64:
    if: ${{ inputs.platforms == 'linux-aarch64' || inputs.platforms == 'both' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Cache GCC sources
        uses: actions/cache@v4
        with:
          path: /tmp/gcc-src/gcc-${{ env.GCC_VERSION }}.tar.xz
          key: gcc-src-${{ env.GCC_VERSION }}

      - name: Download GCC sources (host side)
        run: |
          mkdir -p /tmp/gcc-src && cd /tmp/gcc-src
          if [ ! -f "gcc-${GCC_VERSION}.tar.xz" ]; then
            wget -q "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz"
          fi

      - name: Build in aarch64 container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          dockerRunArgs: |
            --volume /tmp/gcc-src:/gcc-src
          setup: |
            mkdir -p /tmp/artifacts
          artifactPath: /tmp/artifacts
          run: |
            set -euo pipefail

            apt-get update -qq
            apt-get install -y -qq \
              build-essential gfortran wget xz-utils \
              libgmp-dev libmpfr-dev libmpc-dev flex

            WORKDIR=/tmp/gcc-build
            PREFIX=/opt/fortran-pic

            mkdir -p "${WORKDIR}" && cd "${WORKDIR}"
            cp /gcc-src/gcc-${GCC_VERSION}.tar.xz .
            tar xf gcc-${GCC_VERSION}.tar.xz
            cd gcc-${GCC_VERSION}
            ./contrib/download_prerequisites

            # Configure top-level
            mkdir -p "${WORKDIR}/build-pic" && cd "${WORKDIR}/build-pic"

            ${WORKDIR}/gcc-${GCC_VERSION}/configure \
              --prefix="${PREFIX}" \
              --enable-languages=c,fortran \
              --disable-bootstrap \
              --disable-multilib \
              --disable-shared \
              --enable-static \
              --with-pic \
              --disable-libsanitizer \
              --disable-libgomp \
              --disable-libvtv \
              --disable-libatomic \
              --disable-libstdcxx \
              --disable-libssp \
              --disable-libcc1 \
              --disable-libitm \
              --without-isl

            # Build
            make -j$(nproc) all-gcc
            make -j$(nproc) all-target-libquadmath
            make -j$(nproc) all-target-libgfortran

            # Install
            make install-target-libquadmath
            make install-target-libgfortran
            find ${PREFIX} -name '*.so*' -delete 2>/dev/null || true

            # Verify
            echo "── Installed libs ──"
            find ${PREFIX} -name '*.a' -exec ls -lh {} \;

            # Package
            cd ${PREFIX}
            tar czf /tmp/artifacts/fortran-static-pic-linux-aarch64-gcc${GCC_VERSION}.tar.gz \
              $(find . -name '*.a' -o -name '*.spec' -o -name '*.la' -o -name '*.mod' | sort)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortran-static-pic-linux-aarch64-gcc${{ env.GCC_VERSION }}
          path: /tmp/artifacts/fortran-static-pic-linux-aarch64-gcc${{ env.GCC_VERSION }}.tar.gz
          retention-days: ${{ inputs.retention_days }}

  # ───────────────────────────────────────────────────────────────────────
  #  Summary
  # ───────────────────────────────────────────────────────────────────────
  summary:
    needs: [build-x64, build-aarch64]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Summary
        run: |
          echo "## Build Fortran Static PIC Libs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parametro | Valore |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GCC | ${{ env.GCC_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Piattaforme | ${{ inputs.platforms }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Retention | ${{ inputs.retention_days }} giorni |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Jobs" >> $GITHUB_STEP_SUMMARY
          echo "- **x64**: ${{ needs.build-x64.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **aarch64**: ${{ needs.build-aarch64.result }}" >> $GITHUB_STEP_SUMMARY
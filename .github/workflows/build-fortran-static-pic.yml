# ===========================================================================
#  .github/workflows/build-fortran-static-pic.yml
#
#  Build libgfortran.a + libquadmath.a statiche con -fPIC.
#  Container: Amazon Linux 2023 (sia x64 che aarch64).
#  Trigger: manuale (workflow_dispatch).
#
#  Nota su AL2023: immagine molto minimale, mancano gcc, make, wget, tar,
#  findutils, diffutils, binutils, flex, bison, texinfo, ecc.
#  Tutto viene installato esplicitamente via dnf.
# ===========================================================================
name: Build Fortran Static PIC Libs

on:
  workflow_dispatch:
    inputs:
      gcc_version:
        description: "Versione GCC"
        required: true
        default: "13.2.0"
        type: string
      platforms:
        description: "Piattaforme target"
        required: true
        default: "linux-x64"
        type: choice
        options:
          - linux-x64
          - linux-aarch64
          - both
      retention_days:
        description: "Giorni di retention degli artifact"
        required: false
        default: "30"
        type: string

env:
  GCC_VERSION: ${{ github.event.inputs.gcc_version }}
  PREFIX: /opt/fortran-pic

# ─────────────────────────────────────────────────────────────────────────
#  Pacchetti AL2023 necessari (referenza per entrambi i job):
#
#  dnf install -y \
#    gcc gcc-c++ gcc-gfortran \
#    make automake autoconf libtool \
#    wget tar xz gzip bzip2 \
#    gmp-devel mpfr-devel libmpc-devel \
#    flex bison texinfo \
#    diffutils findutils binutils \
#    file which patch
# ─────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────
  #  Build x86_64 in container AL2023
  # ───────────────────────────────────────────────────────────────────────
  build-x64:
    if: ${{ inputs.platforms == 'linux-x64' || inputs.platforms == 'both' }}
    runs-on: ubuntu-22.04
    container:
      image: amazonlinux:2023
    timeout-minutes: 120

    steps:
      # AL2023 non ha git → actions/checkout non funziona nel container.
      # Non serve: scarichiamo direttamente i sorgenti GCC.

      - name: Install AL2023 build dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ gcc-gfortran \
            make automake autoconf libtool \
            wget tar xz gzip bzip2 \
            gmp-devel mpfr-devel libmpc-devel \
            flex bison texinfo \
            diffutils findutils binutils \
            file which patch

          echo "── Toolchain ──"
          gcc --version | head -1
          gfortran --version | head -1
          cat /etc/system-release

      - name: Download & extract GCC
        run: |
          mkdir -p /tmp/gcc-build && cd /tmp/gcc-build
          wget -q "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz"
          tar xf "gcc-${GCC_VERSION}.tar.xz"
          cd "gcc-${GCC_VERSION}"
          ./contrib/download_prerequisites

      - name: Configure (top-level, --with-pic)
        run: |
          mkdir -p /tmp/gcc-build/build-pic
          cd /tmp/gcc-build/build-pic

          /tmp/gcc-build/gcc-${GCC_VERSION}/configure \
            --prefix="${PREFIX}" \
            --enable-languages=c,fortran \
            --disable-bootstrap \
            --disable-multilib \
            --disable-shared \
            --enable-static \
            --with-pic \
            --disable-libsanitizer \
            --disable-libgomp \
            --disable-libvtv \
            --disable-libatomic \
            --disable-libstdcxx \
            --disable-libssp \
            --disable-libcc1 \
            --disable-libitm \
            --without-isl

      - name: Build GCC (compiler stage)
        run: |
          cd /tmp/gcc-build/build-pic
          make -j$(nproc) all-gcc

      - name: Build libquadmath
        run: |
          cd /tmp/gcc-build/build-pic
          make -j$(nproc) all-target-libquadmath

      - name: Build libgfortran
        run: |
          cd /tmp/gcc-build/build-pic
          make -j$(nproc) all-target-libgfortran

      - name: Install
        run: |
          cd /tmp/gcc-build/build-pic
          make install-target-libquadmath
          make install-target-libgfortran
          find ${PREFIX} -name '*.so*' -delete 2>/dev/null || true

      - name: Verify PIC
        run: |
          for LIB in libquadmath.a libgfortran.a; do
            echo "── ${LIB} ──"
            PATH_LIB=$(find ${PREFIX} -name "${LIB}" -print -quit)
            echo "path: ${PATH_LIB}"
            ls -lh "${PATH_LIB}"

            ABS=$(objdump -r "${PATH_LIB}" 2>/dev/null | grep -cE 'R_X86_64_32$' || true)
            ABS=${ABS:-0}
            echo "R_X86_64_32 relocations: ${ABS}"
            if [ "${ABS}" -eq 0 ]; then
              echo "✓ PIC OK"
            else
              echo "⚠ ${ABS} absolute relocations"
              exit 1
            fi
            echo ""
          done

      - name: Package
        run: |
          cd ${PREFIX}
          tar czf /tmp/fortran-static-pic-linux-x64-gcc${GCC_VERSION}.tar.gz \
            $(find . -name '*.a' -o -name '*.spec' -o -name '*.la' -o -name '*.mod' 2>/dev/null | sort)

      - name: Upload artifact
        # upload-artifact funziona anche dentro container
        uses: actions/upload-artifact@v4
        with:
          name: fortran-static-pic-linux-x64-gcc${{ env.GCC_VERSION }}
          path: /tmp/fortran-static-pic-linux-x64-gcc${{ env.GCC_VERSION }}.tar.gz
          retention-days: ${{ inputs.retention_days }}

  # ───────────────────────────────────────────────────────────────────────
  #  Build aarch64 in container AL2023 (via QEMU su runner x64)
  # ───────────────────────────────────────────────────────────────────────
  build-aarch64:
    if: ${{ inputs.platforms == 'linux-aarch64' || inputs.platforms == 'both' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download GCC sources (host side, nativo → veloce)
        run: |
          mkdir -p /tmp/gcc-src
          cd /tmp/gcc-src
          if [ ! -f "gcc-${GCC_VERSION}.tar.xz" ]; then
            wget -q "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz"
          fi

      - name: Build in AL2023 aarch64 container
        run: |
          mkdir -p /tmp/artifacts

          docker run --rm --platform linux/arm64 \
            -v /tmp/gcc-src:/gcc-src:ro \
            -v /tmp/artifacts:/artifacts \
            -e GCC_VERSION="${GCC_VERSION}" \
            -e PREFIX="${PREFIX}" \
            amazonlinux:2023 \
            bash -c '
              set -euo pipefail

              echo "══► Install AL2023 aarch64 dependencies"
              dnf install -y \
                gcc gcc-c++ gcc-gfortran \
                make automake autoconf libtool \
                wget tar xz gzip bzip2 \
                gmp-devel mpfr-devel libmpc-devel \
                flex bison texinfo \
                diffutils findutils binutils \
                file which patch

              echo "── Toolchain ──"
              gcc --version | head -1
              gfortran --version | head -1
              uname -m
              cat /etc/system-release

              echo "══► Extract GCC"
              WORKDIR=/tmp/gcc-build
              mkdir -p "${WORKDIR}" && cd "${WORKDIR}"
              cp /gcc-src/gcc-${GCC_VERSION}.tar.xz .
              tar xf gcc-${GCC_VERSION}.tar.xz
              cd gcc-${GCC_VERSION}
              ./contrib/download_prerequisites

              echo "══► Configure"
              mkdir -p "${WORKDIR}/build-pic" && cd "${WORKDIR}/build-pic"

              ${WORKDIR}/gcc-${GCC_VERSION}/configure \
                --prefix="${PREFIX}" \
                --enable-languages=c,fortran \
                --disable-bootstrap \
                --disable-multilib \
                --disable-shared \
                --enable-static \
                --with-pic \
                --disable-libsanitizer \
                --disable-libgomp \
                --disable-libvtv \
                --disable-libatomic \
                --disable-libstdcxx \
                --disable-libssp \
                --disable-libcc1 \
                --disable-libitm \
                --without-isl

              echo "══► Build compiler stage"
              make -j$(nproc) all-gcc

              echo "══► Build libquadmath"
              make -j$(nproc) all-target-libquadmath

              echo "══► Build libgfortran"
              make -j$(nproc) all-target-libgfortran

              echo "══► Install"
              make install-target-libquadmath
              make install-target-libgfortran
              find ${PREFIX} -name "*.so*" -delete 2>/dev/null || true

              echo "══► Verify"
              for LIB in libquadmath.a libgfortran.a; do
                echo "── ${LIB} ──"
                P=$(find ${PREFIX} -name "${LIB}" -print -quit)
                ls -lh "${P}"
              done

              echo "══► Package"
              cd ${PREFIX}
              tar czf /artifacts/fortran-static-pic-linux-aarch64-gcc${GCC_VERSION}.tar.gz \
                $(find . -name "*.a" -o -name "*.spec" -o -name "*.la" -o -name "*.mod" 2>/dev/null | sort)

              echo "══► Done (aarch64)"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortran-static-pic-linux-aarch64-gcc${{ env.GCC_VERSION }}
          path: /tmp/artifacts/fortran-static-pic-linux-aarch64-gcc${{ env.GCC_VERSION }}.tar.gz
          retention-days: ${{ inputs.retention_days }}

  # ───────────────────────────────────────────────────────────────────────
  #  Summary
  # ───────────────────────────────────────────────────────────────────────
  summary:
    needs: [build-x64, build-aarch64]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Summary
        run: |
          echo "## Build Fortran Static PIC Libs (AL2023)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parametro | Valore |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GCC | ${{ env.GCC_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | Amazon Linux 2023 |" >> $GITHUB_STEP_SUMMARY
          echo "| Piattaforme | ${{ inputs.platforms }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Retention | ${{ inputs.retention_days }} giorni |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Jobs" >> $GITHUB_STEP_SUMMARY
          echo "- **x64**: ${{ needs.build-x64.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **aarch64**: ${{ needs.build-aarch64.result }}" >> $GITHUB_STEP_SUMMARY